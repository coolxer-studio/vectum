# Production Environment Configuration
server.port=11002
# Task Execution Pool Configuration
spring.task.execution.pool.core-size=20
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=100
# Vector Configuration
vector.home=/vector
task.workspace=/workspace
task.file=${task.workspace}/tasks.json
# Auth Configuration
vectum.auth.enabled=true
vectum.auth.token=${VECTUM_AUTH_TOKEN:}
# MCP Server Configuration
spring.ai.mcp.server.name=vectum-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.instructions=This server provides task management tools for vectum
spring.ai.mcp.server.sse-endpoint=/sse
spring.ai.mcp.server.sse-message-endpoint=/mcp/message
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=false
spring.ai.mcp.server.capabilities.prompt=false
spring.ai.mcp.server.capabilities.completion=false
# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
