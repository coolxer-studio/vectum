version: '3.8'

services:
  vectum:
    image: crpi-4pdi7kz96g4v0tg3.cn-beijing.personal.cr.aliyuncs.com/coolxer-studio/vectum:latest
    container_name: vectum
    ports:
      - "11002:11002"
    volumes:
      - ./config/vectum/application.properties:/app/application.properties:ro
    environment:
      TZ: Asia/Shanghai
    restart: unless-stopped
    networks:
      - vectum-network
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      sftp:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11002/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sftp:
    image: atmoz/sftp:latest
    container_name: vectum-sftp
    ports:
      - "2222:22"
    environment:
      SFTP_USERS: vectum:vectum123:1001
      TZ: Asia/Shanghai
    volumes:
      - sftp-data:/home/vectum/upload
    restart: unless-stopped
    networks:
      - vectum-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo exit | sftp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P 22 vectum@localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  zookeeper:
    image: bitnami/zookeeper:3.8
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      TZ: Asia/Shanghai
      ALLOW_ANONYMOUS_LOGIN: "yes"
      ZOO_SERVER_ID: 1
      ZOO_PORT_NUMBER: 2181
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - zookeeper-data:/bitnami/zookeeper/data
    restart: unless-stopped
    networks:
      - vectum-network
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  kafka:
    image: bitnami/kafka:3.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      TZ: Asia/Shanghai
      KAFKA_BROKER_ID: 1
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_MESSAGE_MAX_BYTES: 1048576
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - kafka-data:/bitnami/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vectum-network
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:22.8.16
    container_name: clickhouse
    environment:
      TZ: Asia/Shanghai
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: vectum123
    ports:
      - "8123:8123"
      - "9000:9000"
      - "9009:9009"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - clickhouse-logs:/var/log/clickhouse-server
      - clickhouse-data:/var/lib/clickhouse
    restart: unless-stopped
    networks:
      - vectum-network
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "default", "--password", "vectum123", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  vectum-network:
    driver: bridge

volumes:
  sftp-data:
    driver: local
  zookeeper-data:
    driver: local
  kafka-data:
    driver: local
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local
