version: '3.8'

services:
  vectum:
    image: crpi-4pdi7kz96g4v0tg3.cn-beijing.personal.cr.aliyuncs.com/coolxer-studio/vectum:latest-amd64
    container_name: vectum
    ports:
      - "11002:11002"
    volumes:
      - workspace-data:/workspace
      - sftp-data:/sftp-upload
      - vector-data:/var/lib/vector
    environment:
      TZ: Asia/Shanghai
    restart: unless-stopped
    networks:
      - vectum-network
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      sftp:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11002/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sftp:
    image: crpi-4pdi7kz96g4v0tg3.cn-beijing.personal.cr.aliyuncs.com/coolxer-studio/atmoz-sftp:latest-amd64
    container_name: sftp
    ports:
      - "2222:22"
    environment:
      SFTP_USERS: vectum:vectum123:1001
      TZ: Asia/Shanghai
    volumes:
      - sftp-data:/home/vectum/upload
    command: bash -c "chown -R 1001:1001 /home/vectum/upload && /usr/sbin/sshd -D"
    restart: unless-stopped
    networks:
      - vectum-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo exit | sftp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P 22 vectum@localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:25.9
    container_name: clickhouse
    environment:
      TZ: Asia/Shanghai
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: vectum123
    ports:
      - "8123:8123"
      - "9000:9000"
      - "9009:9009"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/clickhouse/config.xml:/etc/clickhouse-server/config.d/config.xml
      - ./config/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./data/clickhouse/logs:/var/log/clickhouse-server
      - ./data/clickhouse/data:/var/lib/clickhouse
    restart: unless-stopped
    networks:
      - vectum-network
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "default", "--password", "vectum123", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    environment:
      TZ: Asia/Shanghai
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-service:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-service:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTORS: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9094:9094"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - kafka-data:/tmp/kafka-logs
    restart: always
    networks:
      - vectum-network
    healthcheck:
      test: [ "CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  vectum-network:
    driver: bridge

volumes:
  sftp-data:
    driver: local
  kafka-data:
    driver: local
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local
  vector-data:
    driver: local
  workspace-data:
    driver: local
